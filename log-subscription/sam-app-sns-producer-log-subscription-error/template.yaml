AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Système d'alerte d'inactivité des logs (La partie SNS -> SQS -> lambda)

Parameters:
  EnvironmentName:
    Type: String
    Description: La plateforme (dev, prod)

  client:
    Type: String
    Description: La plateforme ou client de l infrastructure

Resources:
  # La fonction Lambda
  SlackDistributorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app_sns.lambda_handler
      Runtime: python3.12
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          SNS_TOPIC_ARN: 
            Fn::ImportValue:
              !Sub "Sns-topic-monitor-${client}-${EnvironmentName}"
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: 
              Fn::ImportValue:
                !Sub "Sns-topic-monitor-${client}-${EnvironmentName}-name"


  # Autoriser CloudWatch Logs à invoquer la fonction Lambda
  PermissionForEventsToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt SlackDistributorFunction.Arn
      Action: "lambda:InvokeFunction"
      Principal: "logs.amazonaws.com"
      SourceAccount: !Ref "AWS::AccountId"
      SourceArn: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/${client}/${EnvironmentName}/*"

Outputs:
  SlackDistributorFunctionArn:
    Value: !GetAtt SlackDistributorFunction.Arn
    Export:
      Name: !Sub "SlackDistributorFunction-monitor-${client}-${EnvironmentName}"
